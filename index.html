<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bebelle">
<meta name="theme-color" content="#C9748F">
<title>Bebelle Hair Salon</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --rose:#C9748F;--rose-dark:#b5607b;--rose-pale:#FBCFE8;--rose-mist:#FDF5F7;
  --ink:#1C1C1E;--stone:#6B7280;--petal:#F9E4EC;--cream:#FFFBFC;
  --border:#F0D9E1;--card:#FFFFFF;
  --success:#10B981;--error:#EF4444;--warning:#F59E0B;
}
html{height:100%;overflow:hidden;}
body{font-family:'DM Sans',sans-serif;background:var(--rose-mist);color:var(--ink);max-width:430px;margin:0 auto;height:100%;overflow:hidden;position:relative;}

/* ── LANG SCREEN ── */
#lang-screen{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 32px;
  background:#1C1017;
  overflow:hidden;
}
#lang-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 100%, rgba(201,116,143,0.35) 0%, transparent 70%),
             radial-gradient(ellipse 50% 40% at 80% 20%, rgba(251,207,232,0.1) 0%, transparent 60%);
}
#lang-screen::after{
  content:'';position:absolute;
  top:-100px;left:50%;transform:translateX(-50%);
  width:600px;height:600px;
  background:radial-gradient(circle, rgba(201,116,143,0.08) 0%, transparent 70%);
  pointer-events:none;
}
.sakura-petals{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.petal{
  position:absolute;
  width:8px;height:8px;
  background:radial-gradient(circle at 30% 30%, rgba(251,207,232,0.9), rgba(201,116,143,0.4));
  border-radius:0 60% 0 60%;
  animation:falling linear infinite;
  opacity:0;
}
@keyframes falling{
  0%{transform:translateY(-20px) rotate(0deg) translateX(0);opacity:0;}
  10%{opacity:0.7;}
  90%{opacity:0.5;}
  100%{transform:translateY(110vh) rotate(720deg) translateX(40px);opacity:0;}
}
.lang-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;}
.lang-logo{
  width:110px;height:110px;border-radius:55px;
  border:2px solid rgba(201,116,143,0.6);
  object-fit:cover;margin-bottom:28px;
  box-shadow:0 0 40px rgba(201,116,143,0.3), 0 8px 32px rgba(0,0,0,0.4);
  animation:logoFade 1s ease forwards;
}
@keyframes logoFade{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}
.lang-name{
  font-family:'Cormorant Garamond',serif;
  color:#fff;font-size:44px;font-weight:600;
  letter-spacing:2px;margin-bottom:4px;
  animation:textFade 1s 0.2s ease both;
}
.lang-tagline{
  color:var(--rose);font-size:10px;letter-spacing:6px;
  font-weight:500;margin-bottom:12px;text-transform:uppercase;
  animation:textFade 1s 0.3s ease both;
}
.lang-location{
  color:rgba(255,255,255,0.35);font-size:12px;letter-spacing:2px;
  margin-bottom:52px;
  animation:textFade 1s 0.4s ease both;
}
@keyframes textFade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.lang-divider{
  width:40px;height:1px;background:rgba(201,116,143,0.4);
  margin-bottom:32px;
  animation:textFade 1s 0.5s ease both;
}
.lang-btn{
  width:100%;padding:17px;border-radius:14px;
  font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:500;cursor:pointer;
  margin-bottom:12px;transition:all 0.25s;border:none;
  animation:textFade 1s 0.6s ease both;
}
.lang-btn.en{
  background:var(--rose);color:#fff;
  box-shadow:0 4px 20px rgba(201,116,143,0.4);
}
.lang-btn.en:active{background:var(--rose-dark);transform:scale(0.98);}
.lang-btn.ja{
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.8);
  border:1px solid rgba(201,116,143,0.3);
  animation-delay:0.7s;
}
.lang-btn.ja:active{background:rgba(255,255,255,0.15);transform:scale(0.98);}

/* ── SCREENS ── */
.screen{display:none;position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px;background:var(--rose-mist);}
.screen.active{display:block;}

/* ── TAB BAR ── */
.tab-bar{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(240,217,225,0.8);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom);
}
.tab-btn{
  flex:1;padding:10px 4px 8px;border:none;background:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-size:10px;font-weight:500;color:var(--stone);
  font-family:'DM Sans',sans-serif;
  transition:color 0.2s;
  position:relative;
}
.tab-btn.active{color:var(--rose);}
.tab-btn svg{width:22px;height:22px;transition:transform 0.2s;}
.tab-btn.active svg{transform:scale(1.1);}
.tab-btn::after{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:0;height:2px;background:var(--rose);border-radius:0 0 3px 3px;
  transition:width 0.3s;
}
.tab-btn.active::after{width:24px;}
.badge{background:var(--error);color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;position:absolute;top:6px;right:calc(50% - 18px);}

/* ── HEADER ── */
.header{
  padding:14px 20px;background:rgba(255,255,255,0.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
}
.header-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);}

/* ── CARDS ── */
.card{background:var(--card);border-radius:18px;padding:18px;margin:10px 16px;box-shadow:0 2px 12px rgba(201,116,143,0.08),0 1px 3px rgba(0,0,0,0.04);}

/* ── BUTTONS ── */
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:500;cursor:pointer;margin-bottom:10px;font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.btn-primary{background:var(--rose);color:#fff;box-shadow:0 4px 14px rgba(201,116,143,0.3);}
.btn-primary:active{background:var(--rose-dark);transform:scale(0.99);}
.btn-secondary{background:transparent;border:1.5px solid var(--rose);color:var(--rose);}
.btn-secondary:active{background:var(--rose-mist);}
.btn-danger{background:#FEE2E2;color:var(--error);border:none;}

/* ── INPUTS ── */
input,select,textarea{
  width:100%;padding:14px 16px;
  border:1.5px solid var(--border);border-radius:12px;
  font-size:15px;margin-bottom:12px;
  background:#fff;color:var(--ink);outline:none;
  font-family:'DM Sans',sans-serif;
  transition:border-color 0.2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--rose);}
label{font-size:12px;font-weight:600;color:var(--stone);letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:6px;}

/* ── AUTH SCREEN ── */
.auth-wrap{
  min-height:100vh;padding:0;
  background:#1C1017;
  display:flex;flex-direction:column;
}
.auth-hero{
  height:240px;position:relative;overflow:hidden;flex-shrink:0;
  background:linear-gradient(160deg,#2d1b3e,#1C1017);
}
.auth-hero::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 100% 80% at 50% 100%, rgba(201,116,143,0.25) 0%, transparent 70%);
}
.auth-hero-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding-top:20px;}
.auth-logo{width:70px;height:70px;border-radius:35px;object-fit:cover;border:2px solid rgba(201,116,143,0.5);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.auth-brand{font-family:'Cormorant Garamond',serif;color:#fff;font-size:30px;font-weight:600;margin-top:12px;letter-spacing:1px;}
.auth-sub{color:var(--rose);font-size:10px;letter-spacing:5px;margin-top:2px;}
.auth-body{
  flex:1;background:var(--rose-mist);
  border-radius:28px 28px 0 0;
  padding:28px 24px 40px;
  margin-top:-24px;
}
.auth-toggle{text-align:center;color:var(--rose);cursor:pointer;font-size:13px;padding:8px;margin-top:4px;}

/* ── WEATHER ── */
.weather-card{
  margin:16px;border-radius:18px;overflow:hidden;
  background:linear-gradient(135deg,#e8f4fd 0%,#fce4ec 100%);
  box-shadow:0 2px 12px rgba(201,116,143,0.1);
}
.weather-main{padding:16px;display:flex;align-items:center;gap:14px;}
.weather-icon{font-size:40px;}
.weather-temp{font-size:32px;font-weight:600;color:var(--ink);}
.weather-desc{font-size:13px;color:var(--stone);margin-top:2px;}
.weather-details{font-size:11px;color:var(--stone);margin-top:3px;}
.weather-tip{
  background:rgba(255,255,255,0.6);
  padding:12px 16px;font-size:12px;color:#1A5276;
  line-height:1.6;border-top:1px solid rgba(201,116,143,0.15);
}

/* ── APPOINTMENT CARDS ── */
.appt-card{
  background:#fff;border-radius:18px;
  margin:8px 16px;
  overflow:hidden;
  box-shadow:0 2px 12px rgba(201,116,143,0.08);
}
.appt-card-accent{height:4px;background:linear-gradient(90deg,var(--rose),var(--rose-pale));}
.appt-card-body{padding:14px 16px;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.status-confirmed{background:#D1FAE5;color:#065F46;}
.status-cancelled{background:#FEE2E2;color:#991B1B;}
.status-late{background:#FEF3C7;color:#92400E;}

/* ── SERVICE CARDS ── */
.svc-card{
  background:#fff;border-radius:18px;
  margin:8px 16px;overflow:hidden;
  box-shadow:0 2px 12px rgba(201,116,143,0.08);
  transition:transform 0.2s;
}
.svc-card:active{transform:scale(0.99);}
.svc-photo{width:100%;height:170px;object-fit:cover;}
.svc-photo-placeholder{
  width:100%;height:100px;
  background:linear-gradient(135deg,var(--petal),var(--rose-pale));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.svc-body{padding:14px 16px 16px;}
.svc-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:4px;}
.svc-desc{font-size:13px;color:var(--stone);line-height:1.5;margin-bottom:10px;}
.svc-meta{display:flex;align-items:center;justify-content:space-between;}
.svc-duration{font-size:12px;color:var(--stone);display:flex;align-items:center;gap:4px;}
.svc-price{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--rose);}

/* ── ABOUT ── */
.about-photos{display:flex;gap:10px;padding:16px;overflow-x:auto;scrollbar-width:none;}
.about-photos::-webkit-scrollbar{display:none;}
.about-photo{width:200px;height:150px;border-radius:16px;object-fit:cover;flex-shrink:0;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.about-section-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:10px;color:var(--ink);}
.hours-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);}
.hours-row:last-child{border-bottom:none;}
.contact-link{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px;background:var(--rose-mist);border-radius:12px;
  text-decoration:none;color:var(--ink);margin-bottom:8px;
  font-size:14px;border:1px solid var(--border);
}
.contact-link-icon{font-size:18px;}

/* ── MODALS ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(28,16,23,0.6);
  z-index:200;align-items:flex-end;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex;}
.modal-box{
  background:#fff;border-radius:24px 24px 0 0;
  padding:0;width:100%;max-width:430px;margin:0 auto;
  max-height:92vh;overflow-y:auto;
}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-head{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;}
.modal-close{border:none;background:var(--rose-mist);color:var(--stone);width:32px;height:32px;border-radius:16px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:20px;}

/* ── BOOKING STEPS ── */
.step-indicator{display:flex;gap:6px;padding:12px 20px;justify-content:center;}
.step-dot{width:8px;height:8px;border-radius:4px;background:var(--border);transition:all 0.3s;}
.step-dot.active{width:24px;background:var(--rose);}
.step-dot.done{background:var(--rose);opacity:0.4;}
.step-title{font-size:13px;font-weight:600;color:var(--stone);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:14px;}
.day-slot{
  padding:10px 10px 8px;border:1.5px solid var(--border);
  border-radius:12px;margin:4px;cursor:pointer;
  display:inline-flex;flex-direction:column;align-items:center;
  min-width:52px;background:#fff;transition:all 0.2s;
}
.day-slot.selected{background:var(--rose);border-color:var(--rose);color:#fff;}
.day-slot.disabled{opacity:0.35;cursor:not-allowed;background:#f9f9f9;}
.day-slot-dow{font-size:10px;font-weight:600;opacity:0.7;}
.day-slot-num{font-size:18px;font-weight:700;line-height:1.1;margin:2px 0;}
.day-slot-time{font-size:9px;opacity:0.6;}
.time-slot{
  padding:9px 14px;border:1.5px solid var(--border);
  border-radius:10px;margin:4px;cursor:pointer;
  font-size:13px;display:inline-block;background:#fff;transition:all 0.2s;
}
.time-slot.selected{background:var(--rose);border-color:var(--rose);color:#fff;}
.time-slot.disabled{opacity:0.35;cursor:not-allowed;}
.chip{
  display:inline-flex;align-items:center;
  padding:8px 14px;border-radius:20px;font-size:13px;
  border:1.5px solid var(--border);margin:4px;cursor:pointer;
  background:#fff;transition:all 0.2s;
}
.chip.selected{background:var(--rose);color:#fff;border-color:var(--rose);}
.summary-box{
  background:linear-gradient(135deg,var(--rose-mist),var(--petal));
  border-radius:16px;padding:16px;margin-bottom:16px;
  border:1px solid var(--border);
}
.summary-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:14px;}
.summary-row:last-child{margin-bottom:0;}
.summary-total{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--rose);}

/* ── ADMIN ── */
.admin-tabs{display:flex;gap:8px;padding:14px 16px;overflow-x:auto;scrollbar-width:none;}
.admin-tabs::-webkit-scrollbar{display:none;}
.admin-tab{
  flex-shrink:0;padding:8px 16px;border-radius:20px;
  border:none;font-size:13px;font-weight:500;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all 0.2s;
}
.admin-tab.active{background:var(--rose);color:#fff;}
.admin-tab:not(.active){background:#fff;color:var(--stone);border:1px solid var(--border);}
.admin-res-card{
  background:#fff;border-radius:16px;margin:8px 16px;padding:14px 16px;
  box-shadow:0 2px 8px rgba(201,116,143,0.07);
}
.admin-svc-row{
  background:#fff;border-radius:14px;margin:8px 16px;padding:12px 14px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 2px 8px rgba(201,116,143,0.07);
}
.admin-svc-photo{width:52px;height:52px;border-radius:10px;object-fit:cover;background:var(--petal);}

/* ── REMEMBER ROW ── */
.remember-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;cursor:pointer;padding:4px 0;}
.checkbox{width:22px;height:22px;border:2px solid var(--rose);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.2s;}
.checkbox.checked{background:var(--rose);}

/* ── MUSIC BTN ── */
.music-btn{
  position:fixed;bottom:88px;left:16px;z-index:99;
  background:rgba(201,116,143,0.92);
  backdrop-filter:blur(10px);
  border:none;border-radius:30px;padding:8px 14px;
  color:#fff;font-size:12px;font-weight:500;cursor:pointer;
  display:none;align-items:center;gap:6px;
  box-shadow:0 4px 16px rgba(201,116,143,0.35);
  font-family:'DM Sans',sans-serif;
}

/* ── NOTIF ── */
.notif-item{padding:12px 0;border-bottom:1px solid var(--border);}
.notif-item:last-child{border-bottom:none;}

/* ── SECTION LABEL ── */
.section-label{padding:16px 20px 6px;font-size:11px;font-weight:600;color:var(--stone);letter-spacing:1px;text-transform:uppercase;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--stone);}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty-text{font-size:15px;}

audio{display:none;}
</style>
</head>
<body>

<!-- LANG SCREEN -->
<div id="lang-screen">
  <div class="sakura-petals" id="sakura"></div>
  <div class="lang-inner">
    <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=300" class="lang-logo" alt="Bebelle">
    <div class="lang-name">Bebelle</div>
    <div class="lang-tagline">Hair Salon</div>
    <div class="lang-location">Ishigaki, Okinawa</div>
    <div class="lang-divider"></div>
    <button class="lang-btn en" onclick="setLang('en')">English</button>
    <button class="lang-btn ja" onclick="setLang('ja')">日本語</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none;height:100%;position:relative;">

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active" style="padding-bottom:0;background:#1C1017;">
    <div class="auth-wrap">
      <div class="auth-hero">
        <div class="auth-hero-inner">
          <img src="https://images.unsplash.com/photo-1560066984-138dadb4c035?w=200" class="auth-logo" alt="Bebelle">
          <div class="auth-brand">Bebelle</div>
          <div class="auth-sub">HAIR SALON</div>
        </div>
      </div>
      <div class="auth-body">
        <h2 id="auth-title" style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;margin-bottom:20px;"></h2>
        <div id="auth-form"></div>
        <div id="auth-toggle" class="auth-toggle"></div>
      </div>
    </div>
  </div>

  <!-- RESERVATIONS SCREEN -->
  <div id="res-screen" class="screen">
    <div class="header">
      <span class="header-title" id="res-title">Reservations</span>
      <button onclick="showBookModal()" style="background:var(--rose);color:#fff;border:none;border-radius:20px;padding:7px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;">
        + <span id="book-btn-text">Book</span>
      </button>
    </div>
    <div id="weather-widget"></div>
    <div id="my-appointments"></div>
  </div>

  <!-- SERVICES SCREEN -->
  <div id="svc-screen" class="screen">
    <div class="header"><span class="header-title" id="svc-title">Menu</span></div>
    <div id="services-list"></div>
  </div>

  <!-- ABOUT SCREEN -->
  <div id="about-screen" class="screen">
    <div id="about-content"></div>
  </div>

  <!-- ADMIN SCREEN -->
  <div id="admin-screen" class="screen">
    <div class="header"><span class="header-title" id="admin-title">Admin</span></div>
    <div id="admin-content"></div>
  </div>

  <!-- TAB BAR -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- MUSIC -->
  <button class="music-btn" id="music-btn" onclick="toggleMusic()">
    <span id="music-icon">♪</span><span id="music-label">Music</span>
  </button>
  <audio id="audio-player" loop>
    <source src="https://www.dropbox.com/scl/fi/w0tcgwgj1h4k9gcw7aaeo/RAINING-IN-Lofi-HipHop.mp3?rlkey=t71rk52la53oivr7iylg47r37&st=fgtzar8n&dl=1" type="audio/mpeg">
  </audio>

  <!-- BOOK MODAL -->
  <div class="modal-overlay" id="book-modal">

// ── AIRTABLE ──
function _getAll(table,cb){
  fetch(_B+encodeURIComponent(table),{headers:{Authorization:_K}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){cb(new Error(d.error),null);return;}
      cb(null,(d.records||[]).map(function(r){
        var f=r.fields||{};f._id=r.id;f.id=f.id||r.id;
        if(f.date)f.date=f.date.substring(0,10);
        return f;
      }));
    }).catch(function(e){cb(e,null);});
}
function _post(table,fields){
  return fetch(_B+encodeURIComponent(table),{method:'POST',headers:{Authorization:_K,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})}).then(function(r){return r.json();});
}
function _patch(table,rid,fields){
  return fetch(_B+encodeURIComponent(table)+'/'+rid,{method:'PATCH',headers:{Authorization:_K,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})}).then(function(r){return r.json();});
}
function _destroy(table,rid){
  return fetch(_B+encodeURIComponent(table)+'/'+rid,{method:'DELETE',headers:{Authorization:_K}}).then(function(r){return r.json();});
}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ── HELPERS ──
function endTime(start,mins){
  var h=parseInt(start.split(':')[0]),m=parseInt(start.split(':')[1]);
  var tot=h*60+m+parseInt(mins);
  return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}
function isWithin24h(dateStr,timeStr){
  var appt=new Date(dateStr+'T'+timeStr);
  var now=new Date();
  var diff=appt.getTime()-now.getTime();
  return diff>0&&diff<24*60*60*1000;
}
function isCancelled(status){return status==='cancelled'||status==='cancelled_late';}
function getHairTip(code,temp,lang){
  var ja=lang==='ja';
  if(temp>=30)return ja?'とても暑いです！UVカットスプレーでヘアケアをしましょう。':'Very hot! Use UV protection spray to shield your hair from sun damage.';
  if(temp>=26)return ja?'暑い日が続いています。保湿ヘアミストがオススメです。':'Hot and sunny! Keep hair hydrated with a leave-in moisture mist.';
  if(code>=200&&code<600)return ja?'雨の日は湿気で髪が広がります。洗い流さないトリートメントでまとめましょう。':'Rainy day! Humidity causes frizz — use a leave-in conditioner to tame your hair.';
  if(temp<18)return ja?'涼しい季節です。頭皮マッサージで血行を促進しましょう！':'Cool day! Great time for a head spa treatment.';
  return ja?'今日は良いコンディションです。サロンでのトリートメントにぴったり！':'Perfect salon weather today! Great day for a relaxing treatment.';
}

function uploadPhoto(callback){
  var input=document.createElement('input');
  input.type='file';input.accept='image/*';
  input.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var fd=new FormData();
    fd.append('file',file);fd.append('upload_preset','bebelle');fd.append('cloud_name','dtu902gsb');
    fetch('https://api.cloudinary.com/v1_1/dtu902gsb/image/upload',{method:'POST',body:fd})
      .then(function(r){return r.json();})
      .then(function(d){callback(d.secure_url);})
      .catch(function(){});
  };
  input.click();
}

function doAuth(){
  var username=(document.getElementById('f-username')||{}).value||'';
  var password=(document.getElementById('f-password')||{}).value||'';
  username=username.trim().toLowerCase();
  if(!username||!password){alert(t('fillAll'));return;}
  if(state.isLogin){
    if(username===ADMIN_ID&&password.toLowerCase()===ADMIN_PASS.toLowerCase()){
      loginUser({username:ADMIN_ID,name:'Fumiko',isAdmin:true});return;
    }
    _getAll('users',function(e,d){
      if(e){alert(t('invalidLogin'));return;}
      var found=(d||[]).find(function(x){return x.username===username&&x.password===password;});
      if(!found){alert(t('invalidLogin'));return;}
      loginUser(found);
    });
  } else {
    var conf=(document.getElementById('f-confirm')||{}).value||'';
    var name=(document.getElementById('f-name')||{}).value||'';
    var phone=(document.getElementById('f-phone')||{}).value||'';
    if(!conf||!name||!phone){alert(t('fillAll'));return;}
    if(password!==conf){alert(t('passNoMatch'));return;}
    _getAll('users',function(e,d){
      if((d||[]).find(function(x){return x.username===username;})){alert(t('userExists'));return;}
      _post('users',{username:username,password:password,name:name,phone:phone}).then(function(){loginUser({username:username,name:name,phone:phone});}).catch(function(){alert(t('fillAll'));});
    });
  }
}

function doCancel(id,isLate){
  var r=state.reservations.find(function(x){return x._id===id;});if(!r)return;
  var ns=isLate?'cancelled_late':'cancelled';
  _patch('reservations',r._id,{status:ns}).then(function(){
    r.status=ns;
    closeModal('manage-modal');
    pushNotif((isLate?t('lateCancelBadge')+' ':'')+t('adminCancelled')+' '+(r.clientName||r.username||''));
    renderReservations();
    alert(t('cancelSuccess'));
  });

// ── BOOKING ──
function showBookModal(){
  state.bookStep=1;state.bookDate=null;state.bookTime=null;state.bookServices=[];state.bookPayment='cash';
  renderBookForm();
  openModal('book-modal');
}

function renderStepDots(){
  var el=document.getElementById('book-steps');if(!el)return;
  var html='';
  for(var i=1;i<=4;i++){
    var cls=i===state.bookStep?'active':i<state.bookStep?'done':'';
    html+='<div class="step-dot '+cls+'"></div>';
  }
  el.innerHTML=html;
}

function renderBookForm(){
  document.getElementById('book-modal-title').textContent=t('bookTitle');
  renderStepDots();
  var el=document.getElementById('book-form');if(!el)return;
  var html='';
  if(state.bookStep===1){
    html+='<div class="step-title">'+t('selectDate')+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;">';
    var today=new Date();
    for(var i=1;i<=30;i++){
      var d=new Date(today);d.setDate(today.getDate()+i);
      var dow=d.getDay();
      var ds=d.toISOString().substring(0,10);
      var h=HORARIO[dow];
      var closed=state.closedDays.find(function(c){return c.date===ds;});
      var disabled=!h||!!closed;
      var days=[t('sun'),t('mon'),t('tue'),t('wed'),t('thu'),t('fri'),t('sat')];
      var sel=state.bookDate===ds;
      html+='<div class="day-slot'+(sel?' selected':'')+(disabled?' disabled':'')+'" onclick="'+(disabled?'':'selectDate(\''+ds+'\')')+'">';
      html+='<span class="day-slot-dow">'+days[dow]+'</span>';
      html+='<span class="day-slot-num">'+d.getDate()+'</span>';
      html+='<span class="day-slot-time">'+(disabled?'✕':(h.a+'-'+h.c))+'</span>';
      html+='</div>';
    }
    html+='</div>';
    if(state.bookDate){
      html+='<div style="margin-top:16px"><button class="btn btn-primary" onclick="state.bookStep=2;renderBookForm()">'+t('selectService')+' →</button></div>';
    }
  } else if(state.bookStep===2){
    html+='<div class="step-title">'+t('selectService')+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;margin-bottom:12px">';
    state.services.forEach(function(s){
      var sel=state.bookServices.find(function(x){return x._id===s._id;});
      html+='<div class="chip'+(sel?' selected':'')+'" onclick="toggleSvc(\''+s._id+'\')">';
      html+=s.name+' <span style="opacity:0.7;font-size:12px">¥'+s.price+'</span>';
      html+='</div>';
    });
    html+='</div>';
    var totP=state.bookServices.reduce(function(a,s){return a+parseInt(s.price||0);},0);
    var totD=state.bookServices.reduce(function(a,s){return a+parseInt(s.duration||0);},0);
    if(state.bookServices.length>0){
      html+='<div style="background:var(--rose-mist);border-radius:12px;padding:12px;font-size:13px;margin-bottom:12px;border:1px solid var(--border)">';
      html+=t('total')+': <strong>¥'+totP+'</strong>  ·  '+totD+t('min')+'</div>';
    }
    html+='<div style="display:flex;gap:8px">';
    html+='<button class="btn btn-secondary" style="margin-bottom:0" onclick="state.bookStep=1;renderBookForm()">← '+t('selectDate')+'</button>';
    if(state.bookServices.length>0){
      html+='<button class="btn btn-primary" style="margin-bottom:0" onclick="state.bookStep=3;renderBookForm()">'+t('selectTime')+' →</button>';
    }
    html+='</div>';
  } else if(state.bookStep===3){
    var dow2=new Date(state.bookDate+'T12:00:00').getDay();
    var h2=HORARIO[dow2];
    var totD2=state.bookServices.reduce(function(a,s){return a+parseInt(s.duration||0);},0);
    html+='<div class="step-title">'+t('selectTime')+'</div>';
    html+='<div style="display:flex;flex-wrap:wrap;margin-bottom:12px">';
    for(var hr=h2.a;hr<h2.c;hr++){
      for(var mn=0;mn<60;mn+=30){
        var ts=String(hr).padStart(2,'0')+':'+String(mn).padStart(2,'0');
        var te=endTime(ts,totD2);
        if(parseInt(te.split(':')[0])>h2.c||(parseInt(te.split(':')[0])===h2.c&&parseInt(te.split(':')[1])>0))continue;
        var conflict=state.reservations.filter(function(r){return r.date===state.bookDate&&r.status==='confirmed';}).some(function(r){return ts<r.endTime&&te>r.time;});
        var sel2=state.bookTime===ts;
        html+='<div class="time-slot'+(sel2?' selected':'')+(conflict?' disabled':'')+'" onclick="'+(conflict?'':'selectTime(\''+ts+'\')')+'">';
        html+=ts+(conflict?' ✕':'');html+='</div>';
      }
    }
    html+='</div>';
    html+='<div style="display:flex;gap:8px">';
    html+='<button class="btn btn-secondary" style="margin-bottom:0" onclick="state.bookStep=2;renderBookForm()">←</button>';
    if(state.bookTime){
      html+='<button class="btn btn-primary" style="margin-bottom:0" onclick="state.bookStep=4;renderBookForm()">'+t('summary')+' →</button>';
    }
    html+='</div>';
  } else if(state.bookStep===4){
    var totP2=state.bookServices.reduce(function(a,s){return a+parseInt(s.price||0);},0);
    var totD3=state.bookServices.reduce(function(a,s){return a+parseInt(s.duration||0);},0);
    html+='<div class="step-title">'+t('summary')+'</div>';
    html+='<div class="summary-box">';
    html+='<div class="summary-row">📅 <span>'+state.bookDate+'</span></div>';
    html+='<div class="summary-row">🕐 <span>'+state.bookTime+' – '+endTime(state.bookTime,totD3)+'</span></div>';
    html+='<div class="summary-row">✂️ <span>'+state.bookServices.map(function(s){return s.name;}).join(', ')+'</span></div>';
    html+='<div style="margin-top:8px"><span class="summary-total">¥'+totP2+'</span><span style="color:var(--stone);font-size:13px;margin-left:8px">/ '+totD3+t('min')+'</span></div>';
    html+='</div>';
    html+='<div class="step-title">'+t('payment')+'</div>';
    html+='<div style="display:flex;gap:8px;margin-bottom:16px">';
    html+='<div class="chip'+(state.bookPayment==='cash'?' selected':'')+'" onclick="state.bookPayment=\'cash\';renderBookForm()">💴 '+t('cash')+'</div>';
    html+='<div class="chip'+(state.bookPayment==='online'?' selected':'')+'" onclick="state.bookPayment=\'online\';renderBookForm()">💳 '+t('online')+'</div>';
    html+='</div>';
    html+='<div style="display:flex;gap:8px">';
    html+='<button class="btn btn-secondary" style="margin-bottom:0;flex:0 0 48px" onclick="state.bookStep=3;renderBookForm()">←</button>';
    html+='<button class="btn btn-primary" style="margin-bottom:0;flex:1" onclick="doBook()">'+t('bookBtn')+'</button>';
    html+='</div>';
  }
  el.innerHTML=html;
}

function selectDate(d){state.bookDate=d;renderBookForm();}
function selectTime(t2){state.bookTime=t2;renderBookForm();}
function toggleSvc(id){
  var idx=state.bookServices.findIndex(function(x){return x._id===id;});
  if(idx>=0)state.bookServices.splice(idx,1);
  else{var s=state.services.find(function(x){return x._id===id;});if(s)state.bookServices.push(s);}
  renderBookForm();
}

function doBook(){
  var totP=state.bookServices.reduce(function(a,s){return a+parseInt(s.price||0);},0);
  var totD=state.bookServices.reduce(function(a,s){return a+parseInt(s.duration||0);},0);
  var et=endTime(state.bookTime,totD);
  var fields={
    id:genId(),clientName:state.user.name||state.user.username,
    username:state.user.username,date:state.bookDate,time:state.bookTime,
    endTime:et,status:'confirmed',
    serviceNames:state.bookServices.map(function(s){return s.name;}).join(', '),
    totalPrice:totP,totalDuration:totD,
    payment_method:state.bookPayment,created_at:new Date().toISOString()
  };
  _post('reservations',fields).then(function(resp){
    var f=resp.fields||{};f._id=resp.id;f.id=f.id||resp.id;
    state.reservations.push(f);
    closeModal('book-modal');
    if(state.bookPayment==='online'){
      var ppUrl=(state.salonCfg&&state.salonCfg.paypal)?state.salonCfg.paypal:PAYPAL_ME;
      window.open(ppUrl+totP+'JPY','_blank');
    }
    pushNotif(t('adminNewBooking')+' '+(state.user.name||state.user.username)+' '+state.bookDate+' '+state.bookTime);
    renderReservations();
    alert(t('bookSuccess'));
  }).catch(function(){alert(t('fillAll'));});
}

function saveConfig(){
  var fields={
    instagram:(document.getElementById('cfg-ig')||{}).value||'',
    facebook:(document.getElementById('cfg-fb')||{}).value||'',
    line:(document.getElementById('cfg-line')||{}).value||'',
    paypal:(document.getElementById('cfg-paypal')||{}).value||'',
    phone:(document.getElementById('cfg-phone')||{}).value||'',
    address:(document.getElementById('cfg-addr')||{}).value||'',
    history:(document.getElementById('cfg-history')||{}).value||'',
    photo1:state.salonCfg.photo1||'',photo2:state.salonCfg.photo2||'',photo3:state.salonCfg.photo3||''
  };
  var cfg=state.salonCfg;
  var promise=cfg&&cfg._id?_patch('salon_config',cfg._id,fields):_post('salon_config',fields);
  promise.then(function(r){
    state.salonCfg=Object.assign(state.salonCfg,fields);state.salonCfg._id=r.id;
    alert(t('save')+' ✓');renderAbout();
  });
}

function uploadConfigPhoto(num){
  uploadPhoto(function(url){
    state.salonCfg['photo'+num]=url;
    var prev=document.getElementById('cfg-photo-preview-'+num);
    if(prev)prev.src=url;else{var wrap=document.getElementById('cfg-photo-btn-'+num).parentNode;var img=document.createElement('img');img.id='cfg-photo-preview-'+num;img.src=url;img.style.cssText='width:100%;height:120px;object-fit:cover;border-radius:12px;margin-bottom:8px';wrap.insertBefore(img,wrap.firstChild);}
    var btn=document.getElementById('cfg-photo-btn-'+num);
    if(btn)btn.textContent='✓ Photo '+num+' uploaded';
  });
}

function addClosedDay(){
  var date=(document.getElementById('closed-date')||{}).value||'';
  var comment=(document.getElementById('closed-comment')||{}).value||'';
  if(!date){alert(t('fillAll'));return;}
  _post('closed_days',{date:date,comment:comment}).then(function(r){
    var f=r.fields||{};f._id=r.id;state.closedDays.push(f);renderAdmin();
  });
}

function deleteClosedDay(id){
  if(!confirm(t('confirmDelete')))return;
  _destroy('closed_days',id).then(function(){
    state.closedDays=state.closedDays.filter(function(c){return c._id!==id;});renderAdmin();
  });
}

function openAddService(){
  var name=prompt(t('serviceName'));if(!name)return;
  var price=prompt(t('servicePrice'));if(!price)return;
  var duration=prompt(t('serviceDuration'));if(!duration)return;
  var desc=prompt(t('serviceDesc'))||'';
  if(!confirm('Add a photo?')){
    _post('services',{name:name,price:parseFloat(price),duration:parseInt(duration),description:desc,photo:''}).then(function(r){
      var f=r.fields||{};f._id=r.id;state.services.push(f);renderAdmin();renderServices();
    });return;
  }
  uploadPhoto(function(url){
    _post('services',{name:name,price:parseFloat(price),duration:parseInt(duration),description:desc,photo:url}).then(function(r){
      var f=r.fields||{};f._id=r.id;state.services.push(f);renderAdmin();renderServices();
    });
  });
}

function openEditService(id){
  var s=state.services.find(function(x){return x._id===id;});if(!s)return;
  var name=prompt(t('serviceName'),s.name);if(name===null)return;
  var price=prompt(t('servicePrice'),s.price);if(price===null)return;
  var duration=prompt(t('serviceDuration'),s.duration);if(duration===null)return;
  var desc=prompt(t('serviceDesc'),s.description||'');
  function save(photoUrl){
    _patch('services',s._id,{name:name,price:parseFloat(price),duration:parseInt(duration),description:desc||'',photo:photoUrl}).then(function(){
      s.name=name;s.price=parseFloat(price);s.duration=parseInt(duration);s.description=desc||'';s.photo=photoUrl;
      renderAdmin();renderServices();
    });
  }
  if(confirm('Change photo?')){uploadPhoto(function(url){save(url);});}
  else{save(s.photo||'');}
}

function deleteService(id){
  if(!confirm(t('confirmDelete')))return;
  _destroy('services',id).then(function(){
    state.services=state.services.filter(function(s){return s._id!==id;});renderAdmin();renderServices();
  });
}

function openNotifs(){
  var el=document.getElementById('notif-list');if(!el)return;
  document.getElementById('notif-title').textContent=t('notifications');
  if(state.adminNotifs.length===0){
    el.innerHTML='<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">'+t('noNotifications')+'</div></div>';
  } else {
    var html='<button onclick="state.adminNotifs=[];renderTabBar();closeModal(\'notif-modal\')" style="border:none;background:var(--rose-mist);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;margin-bottom:14px;color:var(--stone);font-family:\'DM Sans\',sans-serif">'+t('clearAll')+'</button>';
    state.adminNotifs.forEach(function(n){
      html+='<div class="notif-item"><div style="font-weight:500;font-size:14px">'+n.msg+'</div><div style="font-size:11px;color:var(--stone);margin-top:3px">'+n.time+'</div></div>';
    });
    el.innerHTML=html;
  }
  openModal('notif-modal');
}

// ── MUSIC ──
function toggleMusic(){
  var audio=document.getElementById('audio-player');
  var icon=document.getElementById('music-icon');
  var label=document.getElementById('music-label');
  if(audio.paused){
    audio.play().then(function(){icon.textContent='⏸';label.textContent='Lofi ♪';}).catch(function(){});
  } else {
    audio.pause();icon.textContent='♪';label.textContent='Music';
  }
}

// ── MODAL ──
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('modal-overlay'))e.target.classList.remove('open');
});

// ── INIT ──
window.addEventListener('load',function(){
  initSakura();
  document.getElementById('auth-toggle').addEventListener('click',function(){
    state.isLogin=!state.isLogin;renderAuth();
  });
  renderAuth();
});

// ── SERVICE WORKER ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
